version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: devuser
      RABBITMQ_DEFAULT_PASS: devpass

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console UI port (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: devadmin
      MINIO_ROOT_PASSWORD: devpassword123
    volumes:
      - minio_data:/data

volumes:
  minio_data: